# Cuts a release: builds the ONNX artefacts on a CPU runner, uploads
# them to the GitHub Release for the tag, and opens a PR updating
# models/MANIFEST.json with the resulting SHA-256s.
#
# Triggered by pushing a tag (`git tag v0.X.Y && git push --tags`)
# or manually via the Actions UI (workflow_dispatch).

name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag name to publish (e.g. v0.2.0)"
        required: true

permissions:
  contents: write
  pull-requests: write

jobs:
  # ─── Build the ONNX artefacts on a CPU runner ───────────────────────
  onnx:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.resolve.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - id: resolve
        run: |
          TAG="${GITHUB_REF##refs/tags/}"
          [[ "$TAG" == "$GITHUB_REF" ]] && TAG="${{ github.event.inputs.tag }}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install -r build/requirements.txt

      - run: |
          python build/export_onnx.py --variant fp16
          python build/export_onnx.py --variant fp32

      - uses: actions/upload-artifact@v4
        with:
          name: onnx
          path: build/dist/*.onnx

  # ─── Publish + manifest PR ─────────────────────────────────────────
  publish:
    needs: onnx
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          path: build/dist/
          merge-multiple: true

      - name: Upload artefacts to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.onnx.outputs.tag }}
        run: |
          gh release create "$TAG" --generate-notes --draft || true
          gh release upload "$TAG" build/dist/*.onnx --clobber

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: python build/update_manifest.py

      - name: Open manifest PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.onnx.outputs.tag }}
        run: |
          if git diff --quiet models/MANIFEST.json; then
            echo "manifest already in sync — no PR needed"
            exit 0
          fi
          BR="manifest/${TAG}"
          git config user.name  "real-esrgan-serve-bot"
          git config user.email "real-esrgan-serve-bot@users.noreply.github.com"
          git checkout -b "$BR"
          git add models/MANIFEST.json
          git commit -m "manifest: hashes + sizes for $TAG"
          git push -u origin "$BR"
          gh pr create --base main --head "$BR" \
            --title "manifest: $TAG artefact hashes" \
            --body  "Auto-generated after the $TAG release artefacts were published."
