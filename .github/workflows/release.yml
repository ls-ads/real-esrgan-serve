# Cuts a release: builds the ONNX artefacts on a CPU runner, the TRT
# engines on per-GPU-class runners, uploads everything to the GitHub
# Release for the tag, and opens a PR updating models/MANIFEST.json
# with the resulting SHA-256s.
#
# Triggered by pushing a tag (`git tag v0.X.Y && git push --tags`)
# or manually via the Actions UI (workflow_dispatch).
#
# This file is a stub — the GPU runners, the actual `gh release`
# commands, and the manifest-PR step are wired in deliberately
# rather than left as inferred defaults so a maintainer can read
# the workflow and predict exactly what fires.

name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag name to publish (e.g. v0.2.0)"
        required: true

permissions:
  contents: write
  pull-requests: write

jobs:
  # ─── Stage A — CPU export of the ONNX artefacts ─────────────────────
  onnx:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.resolve.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - id: resolve
        run: |
          TAG="${GITHUB_REF##refs/tags/}"
          [[ "$TAG" == "$GITHUB_REF" ]] && TAG="${{ github.event.inputs.tag }}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install -r build/requirements.txt

      - run: |
          python build/export_onnx.py --variant fp16
          python build/export_onnx.py --variant fp32

      - uses: actions/upload-artifact@v4
        with:
          name: onnx
          path: build/dist/*.onnx

  # ─── Stage B — engine builds, one job per GPU class ─────────────────
  # Each runner needs a GPU of its class + tensorrt installed. Use
  # self-hosted GPU runners; label them with the gpu class so the
  # matrix can route correctly.
  engines:
    needs: onnx
    strategy:
      fail-fast: false
      matrix:
        # Add new GPU classes here. Each entry produces one .engine
        # artefact; the matching MANIFEST.json entry is generated by
        # the manifest job below.
        include:
          - gpu_class: rtx-4090
            sm_arch: sm89
            runner_label: gpu-rtx4090
          - gpu_class: l40s
            sm_arch: sm89
            runner_label: gpu-l40s
          - gpu_class: a100
            sm_arch: sm80
            runner_label: gpu-a100
    runs-on: [self-hosted, "${{ matrix.runner_label }}"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: onnx
          path: build/dist/

      - run: pip install -r build/requirements.txt

      - run: |
          python build/compile_engine.py \
            --onnx build/dist/realesrgan-x4plus_fp16.onnx \
            --gpu-class ${{ matrix.gpu_class }} \
            --sm-arch ${{ matrix.sm_arch }}

      - uses: actions/upload-artifact@v4
        with:
          name: engine-${{ matrix.gpu_class }}
          path: build/dist/*.engine

  # ─── Publish + manifest PR ─────────────────────────────────────────
  publish:
    needs: [onnx, engines]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          path: build/dist/
          merge-multiple: true

      - name: Upload artefacts to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.onnx.outputs.tag }}
        run: |
          gh release create "$TAG" --generate-notes --draft || true
          gh release upload "$TAG" build/dist/*.onnx build/dist/*.engine --clobber

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: python build/update_manifest.py

      - name: Open manifest PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.onnx.outputs.tag }}
        run: |
          if git diff --quiet models/MANIFEST.json; then
            echo "manifest already in sync — no PR needed"
            exit 0
          fi
          BR="manifest/${TAG}"
          git config user.name  "real-esrgan-serve-bot"
          git config user.email "real-esrgan-serve-bot@users.noreply.github.com"
          git checkout -b "$BR"
          git add models/MANIFEST.json
          git commit -m "manifest: hashes + sizes for $TAG"
          git push -u origin "$BR"
          gh pr create --base main --head "$BR" \
            --title "manifest: $TAG artefact hashes" \
            --body  "Auto-generated after the $TAG release artefacts were published."
